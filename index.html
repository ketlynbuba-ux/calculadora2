<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Lilás</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f4f4;
}

.calculadora{
    background:#d8b4e8;
    padding:20px;
    border-radius:20px;
    width:320px;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.display{
    width:100%;
    height:80px;
    border:none;
    border-radius:10px;
    background:#d8d1d8;
    text-align:right;
    font-size:2.5rem;
    padding:10px;
    margin-bottom:15px;
    color:#333;
}

.botoes{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:12px;
    font-size:1.3rem;
    cursor:pointer;
    background:#c89ee0;
    color:white;
    transition:.2s;
}

button:hover{
    background:#b782d6;
}

.operador{
    background:#9c6bc5;
}

.operador:hover{
    background:#8752b8;
}

.igual{
    background:#6f42c1;
    grid-column:span 2;
}

.igual:hover{
    background:#5e35b1;
}

.limpar{
    background:#e57373;
}

.limpar:hover{
    background:#d32f2f;
}
</style>
</head>
<body>

<div class="calculadora">
    <input type="text" class="display" id="display" readonly>

    <div class="botoes">
        <button class="limpar" onclick="limpar()">C</button>
        <button onclick="adicionar('%')">%</button>
        <button onclick="apagar()">⌫</button>
        <button class="operador" onclick="adicionar('/')">÷</button>

        <button onclick="adicionar('7')">7</button>
        <button onclick="adicionar('8')">8</button>
        <button onclick="adicionar('9')">9</button>
        <button class="operador" onclick="adicionar('*')">×</button>

        <button onclick="adicionar('4')">4</button>
        <button onclick="adicionar('5')">5</button>
        <button onclick="adicionar('6')">6</button>
        <button class="operador" onclick="adicionar('-')">−</button>

        <button onclick="adicionar('1')">1</button>
        <button onclick="adicionar('2')">2</button>
        <button onclick="adicionar('3')">3</button>
        <button class="operador" onclick="adicionar('+')">+</button>

        <button onclick="adicionar('0')">0</button>
        <button onclick="adicionar('.')">.</button>
        <button class="igual" onclick="calcular()">=</button>
    </div>
</div>

<script>
const display = document.getElementById("display");

function adicionar(valor){
    display.value += valor;
}

function limpar(){
    display.value = "";
}

function apagar(){
    display.value = display.value.slice(0, -1);
}

function calcular(){
    try{
        display.value = eval(display.value);
    }catch{
        display.value = "Erro";
    }
}
</script>

</body>
</html>
